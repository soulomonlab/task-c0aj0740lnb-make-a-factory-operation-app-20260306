openapi: 3.0.3
info:
  title: Factory Operation App API
  version: "1.0.0"
servers:
  - url: /api/v1
paths:
  /facilities:
    get:
      summary: List facilities
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: OK
    post:
      summary: Create facility
      responses:
        '201':
          description: Created
  /facilities/{id}:
    get:
      summary: Get facility
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /machines:
    get:
      summary: List machines
      parameters:
        - name: facility_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
    post:
      summary: Register machine
      responses:
        '201':
          description: Created
  /machines/{id}:
    get:
      summary: Get machine
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
  /operations:
    get:
      summary: List operations
      responses:
        '200':
          description: OK
    post:
      summary: Create operation
      responses:
        '201':
          description: Created
  /operations/{id}/status:
    patch:
      summary: Update operation status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated
  /alerts:
    get:
      summary: List alerts
      responses:
        '200':
          description: OK
  /alerts/{id}/ack:
    post:
      summary: Acknowledge alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Acknowledged
  /auth/callback:
    post:
      summary: OAuth callback
      responses:
        '200':
          description: Authenticated
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
